version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: musicsystem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: musicsystem
      POSTGRES_PASSWORD: musicsystem_secret
      POSTGRES_DB: musicsystem
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: musicsystem_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
